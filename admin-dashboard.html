<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>
OMKLJ INDIA Admin Dashboard
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

:root{

--bg:#020617;
--card:#12203f;
--card2:#0b1630;
--blue:#00aaff;
--green:#16a34a;
--red:#dc2626;
--text:#ffffff;

}

body{

background:var(--bg);
color:var(--text);
padding:20px;
min-height:100vh;

animation:fadeIn .8s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.admin-header{

display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:25px;

}

.logo-section{

display:flex;
align-items:center;
gap:15px;

}

.admin-logo{

width:75px;
height:75px;
object-fit:contain;

animation:logoFloat 3s ease-in-out infinite;

}

@keyframes logoFloat{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

.title-area h1{

font-size:28px;
font-weight:800;
color:var(--blue);

}

.title-area p{

font-size:14px;
opacity:.8;

}

.logout-btn{

background:var(--red);
border:none;
color:white;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:700;

transition:.3s;

}

.logout-btn:hover{

transform:translateY(-2px);

}

.search-box{

margin-bottom:25px;

}

.search-box input{

width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--card);
color:white;
outline:none;
font-size:15px;

}

.stats{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:var(--card);

padding:20px;

border-radius:18px;

text-align:center;

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card h2{

font-size:36px;

color:var(--blue);

margin-bottom:10px;

}

.card p{

opacity:.8;

}

.table-container{

overflow-x:auto;

background:var(--card);

border-radius:18px;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:var(--card2);

padding:16px;

text-align:left;

}

td{

padding:16px;

border-bottom:
1px solid rgba(255,255,255,.08);

}

tr:hover{

background:
rgba(255,255,255,.03);

}

.approve{

background:var(--green);

border:none;

padding:8px 14px;

border-radius:8px;

color:white;

cursor:pointer;

margin-right:8px;

}

.reject{

background:var(--red);

border:none;

padding:8px 14px;

border-radius:8px;

color:white;

cursor:pointer;

}

.badge-approved{

background:var(--green);

padding:8px 12px;

border-radius:8px;

font-size:13px;

}

.badge-rejected{

background:var(--red);

padding:8px 12px;

border-radius:8px;

font-size:13px;

}

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,.7);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.modal-box{

background:var(--card);

padding:25px;

border-radius:16px;

width:90%;
max-width:400px;

text-align:center;

}

.modal-buttons{

margin-top:20px;

display:flex;

gap:10px;

justify-content:center;

}

.modal-buttons button{

padding:10px 16px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:700;

}

.confirm-btn{

background:var(--green);
color:white;

}

.cancel-btn{

background:#555;
color:white;

}
  @media(max-width:768px){

.admin-header{

flex-direction:column;
align-items:flex-start;

}

.admin-logo{

width:65px;
height:65px;

}

.title-area h1{

font-size:22px;

}

.card h2{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="modal"
id="confirmModal">

<div class="modal-box">

<h2 id="modalTitle">
Confirm Action
</h2>

<p id="modalText">
Are you sure?
</p>

<div class="modal-buttons">

<button
class="confirm-btn"
id="confirmActionBtn">

Confirm

</button>

<button
class="cancel-btn"
onclick="closeModal()">

Cancel

</button>

</div>

</div>

</div>

<div class="admin-header">

<div class="logo-section">

<img
src="https://i.ibb.co/N24ghXDh/Picsart-26-06-01-01-49-36-525.png"
class="admin-logo"
alt="OMKLJ INDIA">

<div class="title-area">

<h1>
OMKLJ INDIA ADMIN
</h1>

<p>
Worker Verification & Control Panel
</p>

</div>

</div>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search worker by name, phone, category..."
onkeyup="filterWorkers()">

</div>

<div class="stats">

<div class="card">

<h2 id="totalWorkers">
0
</h2>

<p>
Total Workers
</p>

</div>

<div class="card">

<h2 id="pendingWorkers">
0
</h2>

<p>
Pending Verification
</p>

</div>

<div class="card">

<h2 id="approvedWorkers">
0
</h2>

<p>
Approved Workers
</p>

</div>

<div class="card">

<h2 id="rejectedWorkers">
0
</h2>

<p>
Rejected Workers
</p>

</div>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>
Name
</th>

<th>
Phone
</th>

<th>
Category
</th>

<th>
Status
</th>

<th>
Action
</th>

</tr>

</thead>

<tbody
id="workerTable">

</tbody>

</table>

</div>

<script>

if(
localStorage.getItem(
"adminLoggedIn"
) !== "true"
){

window.location.href =
"admin-login.html";

}

function logout(){

localStorage.removeItem(
"adminLoggedIn"
);

window.location.href =
"admin-login.html";

}

const API =
"https://omklj-global.vercel.app/api/admin";

let allWorkers = [];

let selectedWorkerId = "";

let selectedAction = "";

function closeModal(){

document.getElementById(
"confirmModal"
).style.display =
"none";

}

function openModal(
workerId,
action
){

selectedWorkerId =
workerId;

selectedAction =
action;

document.getElementById(
"confirmModal"
).style.display =
"flex";

document.getElementById(
"modalTitle"
).innerText =
action === "approve"
?
"Approve Worker"
:
"Reject Worker";

document.getElementById(
"modalText"
).innerText =
action === "approve"
?
"Are you sure you want to approve this worker?"
:
"Are you sure you want to reject this worker?";

}
  document.getElementById(
"confirmActionBtn"
).onclick =
async function(){

try{

const response =
await fetch(

`${API}/workers/${selectedWorkerId}/${selectedAction}`,

{
method:"PUT"
}

);

const data =
await response.json();

alert(
data.message ||
"Success"
);

closeModal();

loadWorkers();

}catch(error){

console.error(error);

alert(
"Action Failed"
);

}

};

async function loadWorkers(){

try{

const response =
await fetch(
`${API}/workers`
);

const data =
await response.json();

allWorkers =
data.workers || [];

renderWorkers(
allWorkers
);

}catch(error){

console.error(
"LOAD ERROR",
error
);

}

}

function renderWorkers(
workers
){

document.getElementById(
"totalWorkers"
).innerText =
workers.length;

document.getElementById(
"pendingWorkers"
).innerText =
workers.filter(
w =>
w.verificationStatus ===
"pending"
).length;

document.getElementById(
"approvedWorkers"
).innerText =
workers.filter(
w =>
w.verificationStatus ===
"approved"
).length;

document.getElementById(
"rejectedWorkers"
).innerText =
workers.filter(
w =>
w.verificationStatus ===
"rejected"
).length;

const table =
document.getElementById(
"workerTable"
);

table.innerHTML = "";

workers.forEach(worker => {

let actionHtml = "";

if(
worker.verificationStatus
=== "pending"
){

actionHtml = `

<button
class="approve"
onclick="openModal(
'${worker._id}',
'approve'
)">
Approve
</button>

<button
class="reject"
onclick="openModal(
'${worker._id}',
'reject'
)">
Reject
</button>

`;

}
else if(
worker.verificationStatus
=== "approved"
){

actionHtml = `
<span
class="badge-approved">
Approved
</span>
`;

}
else{

actionHtml = `
<span
class="badge-rejected">
Rejected
</span>
`;

}

table.innerHTML += `

<tr>

<td>
${worker.fullName || "-"}
</td>

<td>
${worker.phone || "-"}
</td>

<td>
${worker.workCategory || "-"}
</td>

<td>
${worker.verificationStatus || "-"}
</td>

<td>
${actionHtml}
</td>

</tr>

`;

});

}

function filterWorkers(){

const keyword =
document
.getElementById(
"searchInput"
)
.value
.toLowerCase();

const filtered =
allWorkers.filter(
worker =>

(worker.fullName || "")
.toLowerCase()
.includes(keyword)

||

(worker.phone || "")
.toLowerCase()
.includes(keyword)

||

(worker.workCategory || "")
.toLowerCase()
.includes(keyword)

);

renderWorkers(
filtered
);

}

loadWorkers();

setInterval(
loadWorkers,
30000
);

</script>

</body>
</html>
