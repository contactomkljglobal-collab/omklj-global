<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMKLJ INDIA - Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:28px;
font-weight:800;
color:#00aaff;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#12203f;
padding:20px;
border-radius:15px;
text-align:center;
}

.card h2{
font-size:32px;
color:#00aaff;
}

.card p{
margin-top:10px;
}

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:#12203f;
border-radius:15px;
overflow:hidden;
}

th,
td{
padding:15px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.1);
}

th{
background:#0b1630;
}

.approve{
background:#16a34a;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
}

.reject{
background:#dc2626;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">
OMKLJ INDIA ADMIN
</div>
</div>

<div class="stats">

<div class="card">
<h2 id="totalWorkers">0</h2>
<p>Total Workers</p>
</div>

<div class="card">
<h2 id="pendingWorkers">0</h2>
<p>Pending Verification</p>
</div>

<div class="card">
<h2 id="approvedWorkers">0</h2>
<p>Approved Workers</p>
</div>

<div class="card">
<h2 id="rejectedWorkers">0</h2>
<p>Rejected Workers</p>
</div>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Category</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="workerTable">
</tbody>

</table>

</div>

<script>

const API =
"https://omklj-global.vercel.app/api/admin";

async function loadWorkers(){

try{

const response =
await fetch(`${API}/workers`);

const data =
await response.json();

console.log(data);

const workers =
data.workers || [];

document.getElementById(
"totalWorkers"
).innerText =
workers.length;

document.getElementById(
"pendingWorkers"
).innerText =
workers.filter(
w => w.verificationStatus === "pending"
).length;

document.getElementById(
"approvedWorkers"
).innerText =
workers.filter(
w => w.verificationStatus === "approved"
).length;

document.getElementById(
"rejectedWorkers"
).innerText =
workers.filter(
w => w.verificationStatus === "rejected"
).length;

const table =
document.getElementById(
"workerTable"
);

table.innerHTML = "";

workers.forEach(worker => {

table.innerHTML += `
<tr>

<td>${worker.fullName}</td>

<td>${worker.phone}</td>

<td>${worker.workCategory}</td>

<td>${worker.verificationStatus}</td>

<td>

<button
class="approve"
onclick="approveWorker('${worker._id}')">
Approve
</button>

<button
class="reject"
onclick="rejectWorker('${worker._id}')">
Reject
</button>

</td>

</tr>
`;

});

}catch(error){

console.error(
"LOAD ERROR:",
error
);

}

}

async function approveWorker(id){

try{

const response =
await fetch(
`${API}/workers/${id}/approve`,
{
method:"PUT"
}
);

const data =
await response.json();

alert(data.message);

loadWorkers();

}catch(error){

console.error(error);

}

}

async function rejectWorker(id){

try{

const response =
await fetch(
`${API}/workers/${id}/reject`,
{
method:"PUT"
}
);

const data =
await response.json();

alert(data.message);

loadWorkers();

}catch(error){

console.error(error);

}

}

loadWorkers();

</script>

</body>
</html>
