<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

OMKLJ Business Registration

</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* =====================================
   OMKLJ BUSINESS REGISTER V2
===================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#020617;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow-x:hidden;

position:relative;

color:white;

}

/* =====================================
   BACKGROUND EFFECTS
===================================== */

body::before{

content:"";

position:fixed;

width:800px;
height:800px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(0,170,255,.25),
transparent 70%
);

top:-250px;
left:-250px;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:700px;
height:700px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(140,0,255,.18),
transparent 70%
);

bottom:-250px;
right:-250px;

z-index:-2;

}

.register-box{

width:100%;

max-width:700px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(18px);

border-radius:28px;

padding:30px;

box-shadow:
0 0 40px rgba(0,170,255,.12);

}

.logo{

display:block;

width:90px;

margin:auto;

margin-bottom:15px;

}

h1{

text-align:center;

margin-bottom:8px;

}

.subtitle{

text-align:center;

color:#9fb8df;

margin-bottom:25px;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

}

input,
select,
textarea{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:14px;

background:#12203f;

color:white;

font-size:15px;

}

textarea{

resize:none;

height:120px;

}

input::placeholder,
textarea::placeholder{

color:#9fb8df;

}

.row{

display:grid;

grid-template-columns:
1fr 1fr;

gap:15px;

}

.register-btn{

width:100%;

padding:16px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:16px;

font-weight:700;

background:
linear-gradient(
90deg,
#00aaff,
#0066ff
);

color:white;

transition:.3s;

}

.register-btn:hover{

transform:
translateY(-3px);

}

.status-box{

margin-top:18px;

text-align:center;

font-weight:600;

color:#59c5ff;

}

@media(max-width:700px){

.row{

grid-template-columns:1fr;

}

.register-box{

padding:22px;

}

}

</style>

</head>

<body>

<div class="register-box">

<img
src="https://i.ibb.co/N24ghXDh/Picsart-26-06-01-01-49-36-525.png"
class="logo">

<h1>

Business Registration

</h1>

<p class="subtitle">

Create your OMKLJ Business Account

</p>

<form id="businessForm">

<div class="row">

<div class="form-group">

<label>

Business Name

</label>

<input
type="text"
id="businessName"
placeholder="Enter Business Name"
required>

</div>

<div class="form-group">

<label>

Owner Name

</label>

<input
type="text"
id="ownerName"
placeholder="Enter Owner Name"
required>

</div>

</div>

<div class="row">

<div class="form-group">

<label>

Mobile Number

</label>

<input
type="tel"
id="mobile"
placeholder="Enter Mobile Number"
required>

</div>

<div class="form-group">

<label>

Email Address

</label>

<input
type="email"
id="email"
placeholder="Enter Email Address"
required>

</div>

</div>

   <div class="row">

<div class="form-group">

<label>

Business Category

</label>

<select id="businessCategory" required>

<option value="">

Select Category

</option>

<option value="Retail Shop">

Retail Shop

</option>

<option value="Restaurant">

Restaurant

</option>

<option value="Hotel">

Hotel

</option>

<option value="Manufacturing">

Manufacturing

</option>

<option value="Construction">

Construction

</option>

<option value="Healthcare">

Healthcare

</option>

<option value="Education">

Education

</option>

<option value="Logistics">

Logistics

</option>

<option value="Service">

Service

</option>

<option value="Other">

Other

</option>

</select>

</div>

<div class="form-group">

<label>

GST Number (Optional)

</label>

<input
type="text"
id="gstNumber"
placeholder="Enter GST Number">

</div>

</div>

<div class="form-group">

<label>

Business Address

</label>

<textarea
id="address"
placeholder="Enter Complete Business Address"
required></textarea>

</div>

<div class="row">

<div class="form-group">

<label>

City

</label>

<input
type="text"
id="city"
placeholder="Enter City"
required>

</div>

<div class="form-group">

<label>

State

</label>

<input
type="text"
id="state"
placeholder="Enter State"
required>

</div>

</div>

<div class="row">

<div class="form-group">

<label>

Pincode

</label>

<input
type="text"
id="pincode"
placeholder="Enter Pincode"
required>

</div>

<div class="form-group">

<label>

Number Of Employees

</label>

<input
type="number"
id="employees"
placeholder="Total Employees">

</div>

</div>

<div class="row">

<div class="form-group">

<label>

Password

</label>

<input
type="password"
id="password"
placeholder="Create Password"
required>

</div>

<div class="form-group">

<label>

Confirm Password

</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

</div>

<button
type="submit"
class="register-btn">

REGISTER BUSINESS

</button>

<div
class="status-box"
id="statusBox">

Ready To Register

</div>

</form>

   <script>

/* =====================================
   BUSINESS REGISTER V2
===================================== */

const businessForm =
document.getElementById(
"businessForm"
);

businessForm.addEventListener(
"submit",
async function(e){

e.preventDefault();

const businessName =
document.getElementById(
"businessName"
).value.trim();

const ownerName =
document.getElementById(
"ownerName"
).value.trim();

const phone =
document.getElementById(
"mobile"
).value.trim();

const email =
document.getElementById(
"email"
).value.trim();

const businessType =
document.getElementById(
"businessCategory"
).value;

const gstNumber =
document.getElementById(
"gstNumber"
).value.trim();

const address =
document.getElementById(
"address"
).value.trim();

const city =
document.getElementById(
"city"
).value.trim();

const state =
document.getElementById(
"state"
).value.trim();

const pincode =
document.getElementById(
"pincode"
).value.trim();

const employees =
document.getElementById(
"employees"
).value;

const password =
document.getElementById(
"password"
).value;

const confirmPassword =
document.getElementById(
"confirmPassword"
).value;

const statusBox =
document.getElementById(
"statusBox"
);

/* =====================================
   VALIDATION
===================================== */

if(password !== confirmPassword){

statusBox.innerHTML =
"Passwords Do Not Match";

statusBox.style.color =
"#ff4d4d";

return;

}

if(password.length < 6){

statusBox.innerHTML =
"Password Must Be At Least 6 Characters";

statusBox.style.color =
"#ff4d4d";

return;

}

statusBox.innerHTML =
"Creating Business Account...";

statusBox.style.color =
"#59c5ff";

/* =====================================
   SEND TO MONGODB
===================================== */

try{

const response =
await fetch(

"https://omklj-global.vercel.app/api/businesses/register",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

businessName,
ownerName,
phone,
email,
businessType,
gstNumber,
address,
city,
state,
pincode,
employees,
password

})

}

);

const data =
await response.json();

if(!response.ok){

statusBox.innerHTML =

data.message ||
"Registration Failed";

statusBox.style.color =
"#ff4d4d";

return;

}

/* =====================================
   SAVE USER
===================================== */

localStorage.setItem(

"omkljBusiness",

JSON.stringify(
data.business
)

);

statusBox.innerHTML =
"Business Registered Successfully";

statusBox.style.color =
"#00ff88";

setTimeout(()=>{

window.location.href =
"business-dashboard.html";

},1500);

}
catch(error){

console.error(error);

statusBox.innerHTML =
"Server Connection Failed";

statusBox.style.color =
"#ff4d4d";

}

});

      /* =====================================
   AUTO LOGIN CHECK
===================================== */

window.addEventListener(
"load",
function(){

const existingBusiness =
localStorage.getItem(
"omkljBusiness"
);

if(existingBusiness){

console.log(
"Business Session Found"
);

}

}
);

/* =====================================
   PAGE READY
===================================== */

document.body.classList.add(
"page-ready"
);

console.log(
"OMKLJ BUSINESS REGISTER V2 LOADED"
);

console.log(
"MongoDB Registration Active"
);

/* =====================================
   FUTURE MODULES
===================================== */

/*

NEXT BUSINESS MODULES

1. Business Verification
2. GST Verification
3. Business Profile Photo
4. Business Documents Upload
5. Trust Score
6. Location Mapping
7. QR Attendance
8. Ratings & Reviews
9. Premium Business Badge
10. Analytics Dashboard

*/

/* =====================================
   END SCRIPT
===================================== */

</script>

</body>

</html>
