<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMKLJ INDIA Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#020617;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.login-box{
background:#12203f;
width:100%;
max-width:400px;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,170,255,.2);
}

.logo{
text-align:center;
font-size:28px;
font-weight:800;
color:#00aaff;
margin-bottom:25px;
}

.subtitle{
text-align:center;
margin-bottom:25px;
opacity:.8;
}

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0b1630;
color:white;
outline:none;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00aaff;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.login-btn:hover{
opacity:.9;
}

.error{
margin-top:15px;
text-align:center;
color:#ff4d4d;
}

</style>

</head>
<body>

<div class="login-box">

<div class="logo">
OMKLJ INDIA
</div>

<div class="subtitle">
Admin Login Panel
</div>

<div class="input-group">
<input
type="email"
id="email"
placeholder="Admin Email">
</div>

<div class="input-group">
<input
type="password"
id="password"
placeholder="Password">
</div>

<button
class="login-btn"
onclick="loginAdmin()">
LOGIN
</button>

<div
class="error"
id="error">
</div>

</div>

<script>

function loginAdmin(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(
email === "admin@omkljindia.com"
&&
password === "OMKLJ@Admin123"
){

localStorage.setItem(
"adminLoggedIn",
"true"
);

window.location.href =
"admin-dashboard.html";

}
else{

document.getElementById(
"error"
).innerText =
"Invalid Admin Credentials";

}

}

</script>

</body>
</html>
