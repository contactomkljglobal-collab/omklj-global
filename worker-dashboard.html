<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
OMKLJ India - Worker Dashboard
</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* =====================================
   OMKLJ WORKER DASHBOARD V2
===================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#020617;

color:white;

overflow-x:hidden;

min-height:100vh;

position:relative;

}

/* =====================================
   GALAXY BACKGROUND
===================================== */

body::before{

content:"";

position:fixed;

width:900px;
height:900px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(0,170,255,.25),
transparent 70%
);

top:-300px;
left:-250px;

animation:
orbOne 20s ease-in-out infinite alternate;

z-index:-4;

}

body::after{

content:"";

position:fixed;

width:800px;
height:800px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(130,0,255,.18),
transparent 70%
);

bottom:-250px;
right:-200px;

animation:
orbTwo 22s ease-in-out infinite alternate;

z-index:-4;

}

@keyframes orbOne{

0%{
transform:translate(0,0);
}

100%{
transform:translate(150px,100px);
}

}

@keyframes orbTwo{

0%{
transform:translate(0,0);
}

100%{
transform:translate(-150px,-100px);
}

}

/* =====================================
   STARS
===================================== */

.stars{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

z-index:-3;

}

.star{

position:absolute;

background:white;

border-radius:50%;

animation:
twinkle infinite;

}

.star:nth-child(1){
top:10%;
left:12%;
width:2px;
height:2px;
animation-duration:4s;
}

.star:nth-child(2){
top:15%;
left:80%;
width:3px;
height:3px;
animation-duration:5s;
}

.star:nth-child(3){
top:30%;
left:55%;
width:2px;
height:2px;
animation-duration:6s;
}

.star:nth-child(4){
top:45%;
left:20%;
width:3px;
height:3px;
animation-duration:4s;
}

.star:nth-child(5){
top:60%;
left:85%;
width:2px;
height:2px;
animation-duration:5s;
}

.star:nth-child(6){
top:75%;
left:40%;
width:3px;
height:3px;
animation-duration:6s;
}

.star:nth-child(7){
top:88%;
left:70%;
width:2px;
height:2px;
animation-duration:4s;
}

.star:nth-child(8){
top:22%;
left:35%;
width:3px;
height:3px;
animation-duration:5s;
}

@keyframes twinkle{

0%{
opacity:.2;
transform:scale(1);
}

50%{
opacity:1;
transform:scale(1.8);
}

100%{
opacity:.2;
transform:scale(1);
}

}

/* =====================================
   CONTAINER
===================================== */

.container{

max-width:1300px;

margin:auto;

padding:30px 20px;

position:relative;

z-index:2;

}

/* =====================================
   HEADER
===================================== */

.dashboard-header{

display:flex;

justify-content:space-between;

align-items:center;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(18px);

padding:20px;

border-radius:22px;

margin-bottom:20px;

}

.logo-area{

display:flex;

align-items:center;

gap:15px;

}

.logo-area img{

width:70px;

filter:
drop-shadow(0 0 12px #00aaff);

animation:
floatLogo 4s ease-in-out infinite;

}

@keyframes floatLogo{

50%{
transform:translateY(-8px);
}

}

.worker-info h2{

font-size:1.5rem;

}

.worker-info p{

color:#b8c8ea;

margin-top:5px;

}

.verify-badge{

background:#0d2a55;

padding:10px 15px;

border-radius:12px;

font-weight:600;

color:#59c5ff;

}
   /* =====================================
   STATS GRID
===================================== */

.stats-grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:15px;

margin-bottom:20px;

}

.stat-card{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(15px);

padding:20px;

border-radius:20px;

text-align:center;

transition:.3s;

}

.stat-card:hover{

transform:
translateY(-5px);

box-shadow:
0 0 20px rgba(0,170,255,.2);

}

.stat-card h3{

font-size:2rem;

color:#59c5ff;

}

.stat-card p{

margin-top:8px;

color:#cfdcff;

}

/* =====================================
   SECTION TITLE
===================================== */

.section-title{

font-size:1.3rem;

font-weight:700;

margin-bottom:15px;

color:#59c5ff;

}

/* =====================================
   JOBS GRID
===================================== */

.jobs-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:18px;

margin-bottom:25px;

}

.job-card{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(15px);

border-radius:22px;

padding:22px;

transition:.3s;

}

.job-card:hover{

transform:
translateY(-5px);

box-shadow:
0 0 20px rgba(0,170,255,.2);

}

.job-title{

font-size:1.2rem;

font-weight:700;

margin-bottom:10px;

}

.job-company{

color:#59c5ff;

margin-bottom:12px;

}

.job-details{

display:grid;

grid-template-columns:
1fr 1fr;

gap:10px;

margin-bottom:15px;

}

.job-detail{

background:#12203f;

padding:10px;

border-radius:10px;

text-align:center;

}

.apply-btn{

width:100%;

padding:14px;

border:none;

border-radius:14px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(
90deg,
#00aaff,
#0066ff
);

color:white;

transition:.3s;

}

.apply-btn:hover{

transform:
translateY(-3px);

}

.empty-state{

background:
rgba(255,255,255,.05);

border:
1px dashed rgba(255,255,255,.2);

padding:40px;

border-radius:20px;

text-align:center;

color:#b8c8ea;

}

/* =====================================
   NOTIFICATIONS
===================================== */

.notifications{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(15px);

border-radius:22px;

padding:22px;

margin-bottom:20px;

}

.notification{

background:#12203f;

padding:14px;

border-radius:12px;

margin-bottom:10px;

}

/* =====================================
   WORK HISTORY
===================================== */

.history{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(15px);

border-radius:22px;

padding:22px;

}

.history-item{

display:flex;

justify-content:space-between;

padding:12px;

border-bottom:
1px solid rgba(255,255,255,.08);

}

.history-item:last-child{

border-bottom:none;

}

@media(max-width:900px){

.stats-grid{
grid-template-columns:1fr 1fr;
}

.jobs-grid{
grid-template-columns:1fr;
}

.dashboard-header{
flex-direction:column;
gap:15px;
text-align:center;
}

}

@media(max-width:600px){

.stats-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="stars">

<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>

</div>

<div class="container">

<div class="dashboard-header">

<div class="logo-area">

<img
src="https://i.ibb.co/N24ghXDh/Picsart-26-06-01-01-49-36-525.png"
alt="OMKLJ">

<div class="worker-info">

<h2 id="workerName">

Loading...

</h2>

<p>

Verified Worker Dashboard

</p>

</div>

</div>

<div class="verify-badge">

✅ Verified Account

</div>

</div>

<div class="stats-grid">

<div class="stat-card">

<h3 id="trustScore">

0

</h3>

<p>

Trust Score

</p>

</div>

<div class="stat-card">

<h3 id="jobsCompleted">

0

</h3>

<p>

Jobs Completed

</p>

</div>

<div class="stat-card">

<h3 id="totalEarnings">

₹0

</h3>

<p>

Total Earnings

</p>

</div>

<div class="stat-card">

<h3 id="newJobsCount">

0

</h3>

<p>

Available Jobs

</p>

</div>

</div>

<h2 class="section-title">

💼 Available Jobs

</h2>

<div
class="jobs-grid"
id="jobsContainer">

<div class="empty-state">

Loading Jobs...

</div>

</div>

<h2 class="section-title">

🔔 Notifications

</h2>

<div
class="notifications"
id="notificationsContainer">

<div class="notification">

Loading Notifications...

</div>

</div>

<h2 class="section-title">

📅 Work History

</h2>

<div
class="history"
id="historyContainer">

<div class="history-item">

<span>

No Completed Jobs Yet

</span>

<strong>

₹0

</strong>

</div>

</div>

   </div>

<script>

/* =====================================
   WORKER DATA
===================================== */

const workerData =
JSON.parse(
localStorage.getItem(
"omkljWorker"
)
);

if(workerData){

document
.getElementById(
"workerName"
)
.innerHTML =

workerData.name ||

workerData.fullName ||

"Worker";

document
.getElementById(
"trustScore"
)
.innerHTML =

workerData.trustScore || 80;

}

/* =====================================
   LOAD JOBS FROM MONGODB
===================================== */

async function loadJobs(){

try{

const response =
await fetch(

"https://omklj-global.vercel.app/api/jobs"

);

const jobs =
await response.json();

const jobsContainer =
document.getElementById(
"jobsContainer"
);

jobsContainer.innerHTML = "";

if(
!jobs ||
jobs.length === 0
){

jobsContainer.innerHTML =

`
<div class="empty-state">

No Jobs Available

</div>
`;

return;

}

document
.getElementById(
"newJobsCount"
)
.innerHTML =
jobs.length;

jobs.forEach(job=>{

const card =
document.createElement(
"div"
);

card.className =
"job-card";

card.innerHTML =

`
<div class="job-title">

${job.title || "Untitled Job"}

</div>

<div class="job-company">

${job.location || "Location Not Available"}

</div>

<div class="job-details">

<div class="job-detail">

${job.workingHours || 0}
Hours

</div>

<div class="job-detail">

₹${job.salary || 0}/hr

</div>

<div class="job-detail">

${job.workersRequired || 1}
Workers

</div>

<div class="job-detail">

${job.category || "General"}

</div>

</div>

<button
class="apply-btn"
data-id="${job._id}">

Apply Now

</button>
`;

jobsContainer.appendChild(
card
);

});

attachApplyButtons();

}
catch(error){

console.error(error);

document
.getElementById(
"jobsContainer"
)
.innerHTML =

`
<div class="empty-state">

Failed To Load Jobs

</div>
`;

}

}

/* =====================================
   APPLY BUTTONS
===================================== */

function attachApplyButtons(){

const buttons =
document.querySelectorAll(
".apply-btn"
);

buttons.forEach(button=>{

button.addEventListener(
"click",
async function(){

const jobId =
this.dataset.id;

if(
!workerData
){

alert(
"Worker Login Required"
);

return;

}

try{

const response =
await fetch(

"https://omklj-global.vercel.app/api/applications/apply",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

jobId,

workerId:
workerData._id

})

}

);

const data =
await response.json();

if(
!response.ok
){

alert(
data.message ||
"Application Failed"
);

return;

}

alert(
"Application Submitted Successfully"
);

}
catch(error){

console.error(error);

alert(
"Server Error"
);

}

}
);

});

}

/* =====================================
   LOAD NOTIFICATIONS
===================================== */

function loadNotifications(){

document
.getElementById(
"notificationsContainer"
)
.innerHTML =

`
<div class="notification">

Live Jobs Connected To MongoDB

</div>

<div class="notification">

Applications System Active

</div>

<div class="notification">

More Features Coming Soon

</div>
`;

}

/* =====================================
   LOAD DASHBOARD
===================================== */

loadJobs();

loadNotifications();

   /* =====================================
   AUTO REFRESH
===================================== */

setInterval(

function(){

loadJobs();

},

30000

);

/* =====================================
   WORK HISTORY PLACEHOLDER
===================================== */

function loadWorkHistory(){

document
.getElementById(
"historyContainer"
)
.innerHTML =

`
<div class="history-item">

<span>

Work History System V2
Coming Soon

</span>

<strong>

₹0

</strong>

</div>
`;

}

loadWorkHistory();

/* =====================================
   DASHBOARD STATUS
===================================== */

console.log(

"OMKLJ WORKER DASHBOARD V2 LOADED"

);

console.log(

"MongoDB Job Feed Active"

);

console.log(

"Worker:",
workerData

);

/* =====================================
   FUTURE MODULES
===================================== */

/*

NEXT MODULES

1. Live Applications
2. Application Status
3. Accept / Reject Updates
4. Attendance QR Scanner
5. Earnings Tracker
6. Trust Score Engine
7. Ratings & Reviews
8. Geo Location Filter
9. Nearby Jobs
10. Worker Wallet

*/

/* =====================================
   READY STATE
===================================== */

document.body.classList.add(
"dashboard-ready"
);

   /* =========================================
   OMKLJ LOCATION SYSTEM V1
   PART 1 - WORKER GPS CAPTURE
========================================= */

let workerLocation = {

    latitude: null,

    longitude: null,

    city: "",

    state: ""

};

async function captureWorkerLocation() {

    if (!navigator.geolocation) {

        console.log(
            "Geolocation not supported"
        );

        return;

    }

    navigator.geolocation.getCurrentPosition(

        async function(position) {

            workerLocation.latitude =
                position.coords.latitude;

            workerLocation.longitude =
                position.coords.longitude;

            console.log(
                "Worker Location:",
                workerLocation
            );

            localStorage.setItem(

                "workerLocation",

                JSON.stringify(
                    workerLocation
                )

            );

            try {

                const response =
                    await fetch(

                        `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${workerLocation.latitude}&lon=${workerLocation.longitude}`

                    );

                const data =
                    await response.json();

                workerLocation.city =
                    data.address.city ||

                    data.address.town ||

                    data.address.village ||

                    "";

                workerLocation.state =
                    data.address.state ||

                    "";

                localStorage.setItem(

                    "workerLocation",

                    JSON.stringify(
                        workerLocation
                    )

                );

                console.log(
                    "Location Updated:",
                    workerLocation
                );

            }

            catch(error) {

                console.error(
                    error
                );

            }

        },

        function(error) {

            console.error(
                error
            );

        },

        {

            enableHighAccuracy: true,

            timeout: 10000,

            maximumAge: 0

        }

    );

}

/* Auto Start */

captureWorkerLocation();

</script>

</body>

</html>
