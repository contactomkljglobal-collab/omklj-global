<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

OMKLJ Worker Registration

</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* =====================================
   OMKLJ WORKER REGISTER V2
===================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#020617;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow-x:hidden;

position:relative;

color:white;

}

/* =====================================
   BACKGROUND EFFECTS
===================================== */

body::before{

content:"";

position:fixed;

width:800px;
height:800px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(0,170,255,.25),
transparent 70%
);

top:-250px;
left:-250px;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:700px;
height:700px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(140,0,255,.18),
transparent 70%
);

bottom:-250px;
right:-250px;

z-index:-2;

}

.register-box{

width:100%;

max-width:700px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(18px);

border-radius:28px;

padding:30px;

box-shadow:
0 0 40px rgba(0,170,255,.12);

}

.logo{

display:block;

width:90px;

margin:auto;

margin-bottom:15px;

}

h1{

text-align:center;

margin-bottom:8px;

}

.subtitle{

text-align:center;

color:#9fb8df;

margin-bottom:25px;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

}

input,
select,
textarea{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:14px;

background:#12203f;

color:white;

font-size:15px;

}

textarea{

resize:none;

height:120px;

}

input::placeholder,
textarea::placeholder{

color:#9fb8df;

}

.row{

display:grid;

grid-template-columns:
1fr 1fr;

gap:15px;

}

.register-btn{

width:100%;

padding:16px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:16px;

font-weight:700;

background:
linear-gradient(
90deg,
#00aaff,
#0066ff
);

color:white;

transition:.3s;

}

.register-btn:hover{

transform:
translateY(-3px);

}

.status-box{

margin-top:18px;

text-align:center;

font-weight:600;

color:#59c5ff;

}

@media(max-width:700px){

.row{
grid-template-columns:1fr;
}

.register-box{
padding:22px;
}

}

</style>

</head>

<body>

<div class="register-box">

<img
src="https://i.ibb.co/N24ghXDh/Picsart-26-06-01-01-49-36-525.png"
class="logo">

<h1>

Worker Registration

</h1>

<p class="subtitle">

Create your OMKLJ Worker Account

</p>

<form id="workerForm">

<div class="row">

<div class="form-group">

<label>

Full Name

</label>

<input
type="text"
id="fullName"
placeholder="Enter Full Name"
required>

</div>

<div class="form-group">

<label>

Mobile Number

</label>

<input
type="tel"
id="mobile"
placeholder="Enter Mobile Number"
required>

</div>

</div>

   <div class="row">

<div class="form-group">

<label>

Email Address

</label>

<input
type="email"
id="email"
placeholder="Enter Email Address"
required>

</div>

<div class="form-group">

<label>

Age

</label>

<input
type="number"
id="age"
placeholder="Enter Age"
min="18"
required>

</div>

</div>

<div class="row">

<div class="form-group">

<label>

Primary Skill

</label>

<select
id="skill"
required>

<option value="">
Select Skill
</option>

<option>
Cleaner
</option>

<option>
Driver
</option>

<option>
Cook
</option>

<option>
Electrician
</option>

<option>
Plumber
</option>

<option>
Mechanic
</option>

<option>
Security Guard
</option>

<option>
Delivery Worker
</option>

<option>
Office Assistant
</option>

<option>
Data Entry Operator
</option>

<option>
Warehouse Worker
</option>

<option>
Packer
</option>

<option>
Loader
</option>

<option>
Cashier
</option>

<option>
Gardener
</option>

<option>
Painter
</option>

</select>

</div>

<div class="form-group">

<label>

Experience (Years)

</label>

<input
type="number"
id="experience"
placeholder="Experience"
min="0">

</div>

</div>

<div class="form-group">

<label>

Skills Description

</label>

<textarea
id="skillsDescription"
placeholder="Describe your skills and experience"></textarea>

</div>

<div class="row">

<div class="form-group">

<label>

City

</label>

<input
type="text"
id="city"
placeholder="Enter City"
required>

</div>

<div class="form-group">

<label>

State

</label>

<input
type="text"
id="state"
placeholder="Enter State"
required>

</div>

</div>

<div class="row">

<div class="form-group">

<label>

Pincode

</label>

<input
type="text"
id="pincode"
placeholder="Enter Pincode"
required>

</div>

<div class="form-group">

<label>

Expected Hourly Rate (₹)

</label>

<input
type="number"
id="expectedRate"
placeholder="Expected Rate">

</div>

</div>

<div class="form-group">

<label>

Complete Address

</label>

<textarea
id="address"
placeholder="Enter Full Address"
required></textarea>

</div>

<div class="row">

<div class="form-group">

<label>

Password

</label>

<input
type="password"
id="password"
placeholder="Create Password"
required>

</div>

<div class="form-group">

<label>

Confirm Password

</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

</div>

<button
type="submit"
class="register-btn">

REGISTER WORKER

</button>

<div
class="status-box"
id="statusBox">

Ready To Register

</div>

</form>

   <script>

/* =====================================
   WORKER REGISTER V2
===================================== */

const workerForm =
document.getElementById(
"workerForm"
);

workerForm.addEventListener(
"submit",
async function(e){

e.preventDefault();

const fullName =
document.getElementById(
"fullName"
).value.trim();

const mobile =
document.getElementById(
"mobile"
).value.trim();

const email =
document.getElementById(
"email"
).value.trim();

const age =
document.getElementById(
"age"
).value;

const skill =
document.getElementById(
"skill"
).value;

const experience =
document.getElementById(
"experience"
).value;

const skillsDescription =
document.getElementById(
"skillsDescription"
).value.trim();

const city =
document.getElementById(
"city"
).value.trim();

const state =
document.getElementById(
"state"
).value.trim();

const pincode =
document.getElementById(
"pincode"
).value.trim();

const expectedRate =
document.getElementById(
"expectedRate"
).value;

const address =
document.getElementById(
"address"
).value.trim();

const password =
document.getElementById(
"password"
).value;

const confirmPassword =
document.getElementById(
"confirmPassword"
).value;

const statusBox =
document.getElementById(
"statusBox"
);

/* =====================================
   VALIDATION
===================================== */

if(password !== confirmPassword){

statusBox.innerHTML =
"Passwords Do Not Match";

statusBox.style.color =
"#ff4d4d";

return;

}

if(password.length < 6){

statusBox.innerHTML =
"Password Must Be At Least 6 Characters";

statusBox.style.color =
"#ff4d4d";

return;

}

if(Number(age) < 18){

statusBox.innerHTML =
"Minimum Age Is 18 Years";

statusBox.style.color =
"#ff4d4d";

return;

}

statusBox.innerHTML =
"Creating Worker Account...";

statusBox.style.color =
"#59c5ff";

/* =====================================
   AUTH REGISTER
===================================== */

try{

const authResponse =
await fetch(

"https://omklj-global.vercel.app/api/auth/register",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:fullName,
email,
password,
role:"worker"

})

}

);

const authData =
await authResponse.json();

if(!authResponse.ok){

statusBox.innerHTML =
authData.message ||
"Registration Failed";

statusBox.style.color =
"#ff4d4d";

return;

}

/* =====================================
   WORKER REGISTER
===================================== */

const workerResponse =
await fetch(

"https://omklj-global.vercel.app/api/workers/register",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

fullName,
mobile,
email,
age,
skill,
experience,
skillsDescription,
city,
state,
pincode,
expectedRate,
address

})

}

);

const workerData =
await workerResponse.json();

if(!workerResponse.ok){

statusBox.innerHTML =
workerData.message ||
"Worker Registration Failed";

statusBox.style.color =
"#ff4d4d";

return;

}

/* =====================================
   SAVE SESSION
===================================== */

localStorage.setItem(

"omkljWorker",

JSON.stringify(
workerData.worker
)

);

if(authData.token){

localStorage.setItem(
"omkljToken",
authData.token
);

}

statusBox.innerHTML =
"Worker Registered Successfully";

statusBox.style.color =
"#00ff88";

setTimeout(()=>{

window.location.href =
"worker-dashboard.html";

},1500);

}
catch(error){

console.error(error);

statusBox.innerHTML =
"Server Connection Failed";

statusBox.style.color =
"#ff4d4d";

}

});

      /* =====================================
   AUTO LOGIN CHECK
===================================== */

window.addEventListener(
"load",
function(){

const existingWorker =
localStorage.getItem(
"omkljWorker"
);

if(existingWorker){

console.log(
"Worker Session Found"
);

}

}
);

/* =====================================
   PAGE READY
===================================== */

document.body.classList.add(
"page-ready"
);

console.log(
"OMKLJ WORKER REGISTER V2 LOADED"
);

console.log(
"MongoDB Worker Registration Active"
);

/* =====================================
   FUTURE MODULES
===================================== */

/*

NEXT WORKER MODULES

1. Aadhaar Verification
2. Face Verification
3. Skill Certificates Upload
4. Worker Profile Photo
5. Trust Score System
6. Nearby Jobs
7. Attendance QR Scanner
8. Earnings Dashboard
9. Ratings & Reviews
10. Worker Wallet

*/

/* =====================================
   END SCRIPT
===================================== */

</script>

</body>

</html>
